server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: linkup-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # =======================
  # JPA COMMON
  # =======================
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # =======================
  # FLYWAY (COMMON)
  # =======================
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # =======================
  # CACHE TYPE
  # =======================
  cache:
    type: redis

# =======================
# APP CONFIG (DOMAIN)
# =======================
linkup:
  security:
    jwt:
      role-claim: realm_access.roles
    cors:
      # Dev default = any localhost port (handled by CorsProperties record).
      # Prod MUST set the env var:
      #   LINKUP_SECURITY_CORS_ALLOWED_ORIGINS=https://app.linkup.io,https://m.linkup.io
      # When the var is unset, Spring binds an empty list and the record falls back
      # to the localhost defaults (safe for dev, never deploy that to prod).
      allow-credentials: true
      max-age: 3600

  booking:
    max-items-per-user: 5
    default-page-size: 20
    max-page-size: 100

  idempotency:
    header-name: Idempotency-Key
    ttl: PT24H
    max-key-length: 128
    cleanup-cron: "0 0 3 * * *"

  activity:
    default-page-size: 20
    max-page-size: 100

# =======================
# LOGGING DEFAULT
# =======================
logging:
  level:
    root: INFO