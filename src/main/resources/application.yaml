server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: linkup-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # =======================
  # JPA COMMON
  # =======================
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # =======================
  # FLYWAY (COMMON)
  # =======================
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # =======================
  # CACHE TYPE
  # =======================
  cache:
    type: redis

# =======================
# APP CONFIG (DOMAIN)
# =======================
linkup:
  security:
    jwt:
      role-claim: realm_access.roles

  booking:
    max-items-per-user: 5
    default-page-size: 20
    max-page-size: 100

  idempotency:
    header-name: Idempotency-Key
    ttl: PT24H
    max-key-length: 128
    cleanup-cron: "0 0 3 * * *"

  activity:
    default-page-size: 20
    max-page-size: 100

# =======================
# LOGGING DEFAULT
# =======================
logging:
  level:
    root: INFO