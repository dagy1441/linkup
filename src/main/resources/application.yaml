server:
  port: ${SERVER_PORT:8080}
  # Defensive caps on request size — protects the JVM from oversized payloads
  # (idempotency hashing, jackson deserialization, log noise).
  # MVP values; widen when US-030 brings photo upload (separate multipart path).
  tomcat:
    max-http-form-post-size: 256KB
    max-swallow-size: 256KB
  max-http-request-header-size: 16KB

spring:
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB
  application:
    name: linkup-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # =======================
  # JPA COMMON
  # =======================
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # =======================
  # FLYWAY (COMMON)
  # =======================
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# =======================
# APP CONFIG (DOMAIN)
# =======================
linkup:
  security:
    jwt:
      role-claim: realm_access.roles
    cors:
      # Dev default = any localhost port (handled by CorsProperties record).
      # Prod MUST set the env var:
      #   LINKUP_SECURITY_CORS_ALLOWED_ORIGINS=https://app.linkup.io,https://m.linkup.io
      # When the var is unset, Spring binds an empty list and the record falls back
      # to the localhost defaults (safe for dev, never deploy that to prod).
      allow-credentials: true
      max-age: 3600

  booking:
    max-items-per-user: 5
    default-page-size: 20
    max-page-size: 100

  idempotency:
    header-name: Idempotency-Key
    ttl: PT24H
    max-key-length: 128
    max-body-bytes: 65536      # 64 KB — protects SHA-256 hashing from oversized payloads
    cleanup-cron: "0 0 3 * * *"

  activity:
    default-page-size: 20
    max-page-size: 100

  # =========================
  # Profile module — photo storage (MinIO in dev, S3 in prod)
  # =========================
  profile:
    max-bytes: 1048576                                    # 1 MB cap on uploads (US-007)
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
    lifecycle:
      deletion-grace-period: P30D                          # GDPR-friendly; US-012
      purge-cron: "0 0 4 * * *"                            # 04:00 UTC daily
    storage:
      endpoint: ${LINKUP_PROFILE_STORAGE_ENDPOINT:http://localhost:9000}
      access-key: ${LINKUP_PROFILE_STORAGE_ACCESS_KEY:${MINIO_ROOT_USER:minioadmin}}
      secret-key: ${LINKUP_PROFILE_STORAGE_SECRET_KEY:${MINIO_ROOT_PASSWORD:minioadmin}}
      bucket: ${LINKUP_PROFILE_STORAGE_BUCKET:linkup-profiles}
      presigned-url-ttl: PT1H

# =======================
# LOGGING DEFAULT
# =======================
logging:
  level:
    root: INFO